[theme]
font                     = "Inter"
primaryColor             = "#1B6CA8"   # deep sky blue — buttons, checkboxes, active widgets
backgroundColor          = "#FFFFFF"   # pure white main panel
secondaryBackgroundColor = "#F0F5FB"   # pale blue-grey for expanders / widget fields
textColor                = "#1A2637"   # near-black with a cool tint, easier on the eye than pure black
